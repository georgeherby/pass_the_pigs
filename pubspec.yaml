name: pass_the_pigs
description: Pass the Pigs
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  bloc: ^9.0.0
  confetti: ^0.8.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.6
  google_fonts: ^8.1.0
  intl: ^0.20.2

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  # Enable generation of localized Strings from arb files.
  generate: true
  assets:
    - assets/images/icons/dot.gif
    - assets/images/icons/no_dot.gif
    - assets/images/icons/leaningjowler.gif
    - assets/images/icons/oinker.gif
    - assets/images/icons/razorback.gif
    - assets/images/icons/snouter.gif
    - assets/images/icons/trotter.gif
    - assets/google_fonts/
